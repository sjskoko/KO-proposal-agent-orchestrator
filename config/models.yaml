default_provider: gemma4_local

providers:
  gemma4_local:
    type: local
    backend: transformers_local
    model: /mnt/raid1/CHK/playground/Gemma4/ckpts/gemma-4-26B-A4B-it
    base_url: ""
    context_window: 131072
    priority: 1

routing:
  rules:
    - match: { task_type: code_generation }
      prefer: gemma4_local
    - match: { task_type: long_document }
      prefer: gemma4_local      # large context stays local
  fallback_chain:
    - gemma4_local

retry:
  max_attempts: 3
  backoff: exponential
  backoff_base_ms: 500
  max_backoff_ms: 10000
