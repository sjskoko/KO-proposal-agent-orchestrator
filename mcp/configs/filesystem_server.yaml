id: mcp_filesystem
transport: stdio
command: npx
args:
  - "-y"
  - "@modelcontextprotocol/server-filesystem"
  - "./workspace"

capabilities:
  - read_file
  - write_file
  - list_directory
  - create_directory

permissions_required:
  - file_read
  - file_write

enabled: true
description: "MCP filesystem server — exposes workspace directory over MCP"
