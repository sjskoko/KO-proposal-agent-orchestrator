id: mcp_brave_search
transport: stdio
command: npx
args:
  - "-y"
  - "@modelcontextprotocol/server-brave-search"

env:
  BRAVE_API_KEY: "${BRAVE_API_KEY}"

capabilities:
  - web_search
  - news_search

permissions_required:
  - network_access
  - api_call

enabled: false    # set to true and provide BRAVE_API_KEY to activate
description: "MCP Brave Search server — web search via Brave Search API"
